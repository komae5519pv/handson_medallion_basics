<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B3139"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1B3139" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="grad-bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="grad-silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="grad-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="grad-gov" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="480" height="520" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="240" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1B3139">ETL パイプライン DAG</text>
  <text x="240" y="62" text-anchor="middle" font-size="12" fill="#64748b">Databricks Jobs ワークフロー</text>

  <!-- Node 1: Bronze -->
  <rect x="100" y="85" width="280" height="80" rx="12" fill="url(#grad-bronze)" filter="url(#shadow)"/>
  <rect x="100" y="85" width="280" height="80" rx="12" fill="none" stroke="#1e3a8a" stroke-width="1" opacity="0.3"/>
  <text x="140" y="122" font-size="22">📥</text>
  <text x="170" y="118" font-size="16" font-weight="700" fill="#ffffff">02_データ取り込み</text>
  <text x="170" y="140" font-size="12" fill="#bfdbfe">Bronze — CSV → Delta テーブル</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="165" x2="240" y2="195" stroke="#1B3139" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Node 2: Silver -->
  <rect x="100" y="200" width="280" height="80" rx="12" fill="url(#grad-silver)" filter="url(#shadow)"/>
  <rect x="100" y="200" width="280" height="80" rx="12" fill="none" stroke="#334155" stroke-width="1" opacity="0.3"/>
  <text x="140" y="237" font-size="22">🔄</text>
  <text x="170" y="233" font-size="16" font-weight="700" fill="#ffffff">03_データ加工 Silver</text>
  <text x="170" y="255" font-size="12" fill="#cbd5e1">型変換・JOIN・クレンジング</text>

  <!-- Arrow 2→3 -->
  <line x1="240" y1="280" x2="240" y2="310" stroke="#1B3139" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Node 3: Gold -->
  <rect x="100" y="315" width="280" height="80" rx="12" fill="url(#grad-gold)" filter="url(#shadow)"/>
  <rect x="100" y="315" width="280" height="80" rx="12" fill="none" stroke="#92400e" stroke-width="1" opacity="0.3"/>
  <text x="140" y="352" font-size="22">⭐</text>
  <text x="170" y="348" font-size="16" font-weight="700" fill="#ffffff">04_データ加工 Gold</text>
  <text x="170" y="370" font-size="12" fill="#fef3c7">RFM分析・AI関数・集計</text>

  <!-- Arrow 3→4 -->
  <line x1="240" y1="395" x2="240" y2="425" stroke="#1B3139" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Node 4: Governance -->
  <rect x="100" y="430" width="280" height="80" rx="12" fill="url(#grad-gov)" filter="url(#shadow)"/>
  <rect x="100" y="430" width="280" height="80" rx="12" fill="none" stroke="#14532d" stroke-width="1" opacity="0.3"/>
  <text x="140" y="467" font-size="22">🔒</text>
  <text x="170" y="463" font-size="16" font-weight="700" fill="#ffffff">05_テーブル設定</text>
  <text x="170" y="485" font-size="12" fill="#bbf7d0">PK/FK・コメント・マスキング</text>
</svg>